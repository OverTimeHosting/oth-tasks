name: Publish to npm

on:
  # Push a tag like v0.1.1 to trigger a release.
  push:
    tags: ["v*"]
  # Or run it manually from the Actions tab.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # id-token: write was only needed when --provenance was on.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      # Guard against accidental re-publish of an already-published version.
      # If you push v0.1.0 and the registry already has 0.1.0, the job fails
      # cleanly instead of erroring out mid-publish.
      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing $PKG_VERSION"

      # No `--provenance` — that requires the npm token to support
      # sigstore attestation, which Granular tokens don't always do.
      # Re-add once we switch to an OIDC-trusted publisher or an
      # Automation token that supports signing.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
